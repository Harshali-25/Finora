<!-- save as finora_navbar.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="600" height="150">
  <!-- Transparent background -->
  <defs>
    <style>
      /* Use system serif as fallback; replace with your licensed font if needed */
      .brand-text { fill: #0A3A80; font-family: "Georgia", "Times New Roman", serif; font-weight: 700; font-size: 56px; letter-spacing: 1px; }
      .bar { fill: #0D6EFD; }
      .arrow { fill: none; stroke: #0A3A80; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Bar chart (4 bars) -->
  <!-- bars align left -->
  <g transform="translate(35,60)">
    <rect class="bar" x="0" y="55" width="18" height="15" rx="2"></rect>
    <rect class="bar" x="30" y="35" width="18" height="35" rx="2"></rect>
    <rect class="bar" x="60" y="18" width="18" height="52" rx="2"></rect>
    <rect class="bar" x="90" y="0" width="18" height="70" rx="2"></rect>
  </g>

  <!-- Smooth rising curve + arrow head -->
  <path class="arrow" d="M 10 80 
                          C 45 50, 95 30, 135 20
                          C 170 12, 205 8, 240 5"></path>
  <!-- arrow head -->
  <polygon fill="#0A3A80" points="240,5 252,13 236,19"></polygon>

  <!-- Company name -->
  <text x="290" y="100" class="brand-text">FINORA</text>
</svg>
